// 레벨 L까지 누적 필요 경험치 (L레벨 도달 총량)
function expForLevel(L) {
  return Math.round(120 * (L - 1) + 55 * (L - 1) * (L - 1));
}
function anglerLevelFromExp(exp) {
  let L = 1;
  while (expForLevel(L + 1) <= exp) L++;
  return L;
}
function anglerTitle(level) {
  let t = ANGLER_TITLES[0].name;
  for (const x of ANGLER_TITLES) if (level >= x.min) t = x.name;
  return t;
}
function levelUpReward(level) {
  return 100 + level * 50;
}

function buildLeaderboard(myBest, myName) {
  // 라이벌 점수는 고정 기준점(2200) + 내 최고점의 영향이 약하게. 실력이 늘면 1위까지 추월 가능.
  const anchor = 800 + myBest * 0.5;
  const list = RIVALS.map(r => ({
    name: r.name,
    emoji: r.emoji,
    score: Math.round((600 + anchor * r.mul) / 10) * 10,
    me: false
  }));
  list.push({
    name: myName || "나",
    emoji: "⭐",
    score: myBest,
    me: true
  });
  list.sort((a, b) => b.score - a.score);
  return list;
}

function spotMissions(spot) {
  const scoreGoal = Math.max(300, Math.round((400 + spot.unlock.coin * 0.005) / 50) * 50);
  const catchGoal = 7 + Math.round(spot.unlock.gearSum / 3);

}

// 날씨-미끼 궁합 힌트. 실제 게임 수치(nightMul, fakeMul)에 근거한 정직한 힌트만 준다.
function weatherBaitHint(weather, equippedBait, ownedBaits) {
  const cur = BAITS[equippedBait] || BAITS.basic;
  if (weather.time === "night") {
    const bestNight = ownedBaits.map(k => BAITS[k]).filter(Boolean).sort((a, b) => (b.eff.nightMul || 1) - (a.eff.nightMul || 1))[0];
    if (bestNight && (bestNight.eff.nightMul || 1) > 1 && bestNight !== cur) {
      return `🌙 밤이에요 — ${bestNight.icon} ${bestNight.name}을 쓰면 입질이 더 잦아져요`;
    }
    if (cur.eff.nightMul > 1) return `🌙 ${cur.icon} ${cur.name} 장착 중 — 밤에 딱이에요!`;
  }
  if (weather.sky === "rain") {
    return "🌧️ 비가 와서 헛입질이 줄어요 — 입질 잦은 미끼도 써볼 만해요";
  }
  if (weather.sky === "cloudy") {
    return "☁️ 흐린 날은 입질이 살짝 더 와요";
  }
  return null;
}

// 오늘 날짜 키 (YYYY-MM-DD)
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}
function yesterdayKey() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}
// 연속 접속일수에 따른 보상 코인
function streakReward(count) {
  return 100 + Math.min(count, 14) * 50; // 최대 14일까지 계속 커짐, 이후 고정
}
const LIVES_ENABLED = false; // 🔧 목숨 시스템 보류 중. 되살리려면 true로 바꾸면 끝.

// 저장된 lives가 오늘 것이 아니면(날짜가 바뀌었으면) 리셋해서 반환
function freshLives(saved) {
  if (saved && saved.date === todayKey()) return saved;
  return { date: todayKey(), remaining: DAILY_LIVES };
}
// 날짜 시드 기반 의사난수 (같은 날 같은 과제)
function seeded(seedStr) {
  let h = 2166136261;
  for (let i = 0; i < seedStr.length; i++) {
    h ^= seedStr.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return () => {
    h += 0x6D2B79F5;
    let t = Math.imul(h ^ h >>> 15, 1 | h);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makeDailyTasks() {
  const date = todayKey();
  const rnd = seeded(date);
  const allFish = Object.keys(FISH);
  const pick = arr => arr[Math.floor(rnd() * arr.length)];
  const tasks = [];
  // 1) 총 N마리 잡기
  const totalN = 8 + Math.floor(rnd() * 8);
  tasks.push({
    id: "total",
    type: "total",
    target: totalN,
    prog: 0,
    reward: 200,
    label: `물고기 ${totalN}마리 낚기`
  });
  // 2) 특정 어종 잡기 (흔함~보통 위주)
  const common = allFish.filter(n => FISH[n].rarity <= 2);
  const fishName = pick(common);
  const fishN = 2 + Math.floor(rnd() * 3);
  tasks.push({
    id: "fish",
    type: "fish",
    fish: fishName,
    target: fishN,
    prog: 0,
    reward: 300,
    label: `${fishName} ${fishN}마리 낚기`
  });
  // 3) 월척(대물/완벽) 또는 콤보
  if (rnd() < 0.5) {
    const comboN = 5 + Math.floor(rnd() * 4);
    tasks.push({
      id: "combo",
      type: "combo",
      target: comboN,
      prog: 0,
      reward: 350,
      label: `${comboN} 콤보 달성`
    });
  } else {
    tasks.push({
      id: "big",
      type: "big",
      target: 1,
      prog: 0,
      reward: 350,
      label: `대물(귀함 이상) 1마리 낚기`
    });
  }
  return {
    date,
    tasks
  };
}

function vibrate(p) {
  try {
    if (navigator.vibrate) navigator.vibrate(p);
  } catch (e) {}
}
let audioCtx = null;
function getCtx() {
  if (typeof window === "undefined") return null;
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  return audioCtx;
}
function tone({
  freq = 440,
  dur = 0.12,
  type = "sine",
  vol = 0.18,
  slideTo = null,
  attack = 0.005,
  delay = 0
}) {
  const ctx = getCtx();
  if (!ctx) return;
  if (ctx.state === "suspended") {
    ctx.resume().then(() => tone({ freq, dur, type, vol, slideTo, attack, delay }));
    return;
  }
  const t = ctx.currentTime + delay,
    osc = ctx.createOscillator(),
    gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(vol, t + attack);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}
// 짧은 노이즈 버스트 (물보라·첨벙 느낌). 필터로 색깔 조절.
function noise({
  dur = 0.18,
  vol = 0.16,
  type = "lowpass",
  freq = 1200,
  q = 1,
  slideTo = null,
  delay = 0
}) {
  const ctx = getCtx();
  if (!ctx) return;
  if (ctx.state === "suspended") {
    ctx.resume().then(() => noise({ dur, vol, type, freq, q, slideTo, delay }));
    return;
  }
  const t = ctx.currentTime + delay;
  const n = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n); // 감쇠 노이즈
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = type;
  filt.frequency.setValueAtTime(freq, t);
  filt.Q.value = q;
  if (slideTo) filt.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(filt);
  filt.connect(gain);
  gain.connect(ctx.destination);
  src.start(t);
  src.stop(t + dur + 0.02);
}

// sounds/ 폴더에 mp3를 넣으면 자동으로 그 소리를 사용. 없으면 합성음(fallback).
// 파일명: bite.mp3, catch.mp3, perfect.mp3, big.mp3, splash.mp3, miss.mp3,
//         pull.mp3, fever.mp3, buy.mp3, unlock.mp3
const SOUND_FILES = ["bite", "catch", "perfect", "big", "splash", "miss", "pull", "fever", "buy", "unlock"];
const audioBuffers = {}; // 로드된 음원
const audioTried = {}; // 로드 시도 여부
function loadSound(key) {
  if (audioTried[key]) return;
  audioTried[key] = true;
  const ctx = getCtx();
  if (!ctx) return;
  fetch(`sounds/${key}.mp3`).then(r => r.ok ? r.arrayBuffer() : Promise.reject()).then(buf => ctx.decodeAudioData(buf)).then(decoded => {
    audioBuffers[key] = decoded;
  }).catch(() => {}); // 파일 없으면 조용히 합성음 사용
}
function playFile(key, vol = 0.7) {
  const ctx = getCtx();
  if (!ctx || !audioBuffers[key]) return false;
  if (ctx.state === "suspended") {
    ctx.resume().then(() => playFile(key, vol));
    return true;
  }
  const src = ctx.createBufferSource();
  src.buffer = audioBuffers[key];
  const g = ctx.createGain();
  g.gain.value = vol;
  src.connect(g);
  g.connect(ctx.destination);
  src.start();
  return true;
}

// 물 튀는 소리 (여러 겹으로 사실감 ↑)
function splashNoise(strength = 1) {
  // 1) 초기 "촥" — 넓은 대역 노이즈가 빠르게 감쇠
  noise({
    dur: 0.09 * strength,
    vol: 0.2 * strength,
    type: "highpass",
    freq: 900,
    slideTo: 3000
  });
  // 2) 물살 갈라짐 — 중역 대역이 아래로
  noise({
    dur: 0.22 * strength,
    vol: 0.16 * strength,
    type: "bandpass",
    freq: 1800,
    q: 0.7,
    slideTo: 400,
    delay: 0.02
  });
  // 3) 잔물결 — 낮게 깔리는 여운
  noise({
    dur: 0.3 * strength,
    vol: 0.09 * strength,
    type: "lowpass",
    freq: 700,
    slideTo: 200,
    delay: 0.06
  });
  // 4) 물방울 몇 개 튐
  for (let i = 0; i < 3; i++) {
    const f = 900 + Math.random() * 1200;
    tone({
      freq: f,
      slideTo: f * 1.7,
      dur: 0.05,
      type: "sine",
      vol: 0.05 * strength,
      delay: 0.08 + i * 0.05
    });
  }
}

// 배경음: 앱을 켜는 동안 계속 은은하게 흐르고, 실제 낚시 플레이 중엔 살짝 낮춰(덕킹)
// 효과음이 더 잘 들리게 한다. 화면 전환마다 start/stop을 반복하지 않는다.
const BGM_SRC = "bgm.mp3"; // Kevin MacLeod - "Almost New" (CC BY 4.0)
const bgm = {
  el: null,
  vol: 0.35,       // 사용자가 설정한 기준 볼륨(0~1)
  duckFactor: 1,    // 1 = 평상시, <1 = 낮춤(플레이 중)
  fadeTimer: null,
  wantPlaying: false, // 설정상 재생을 원하는 상태인지
  _ensure() {
    if (this.el) return this.el;
    try {
      const a = new Audio(BGM_SRC);
      a.loop = true;
      a.preload = "auto";
      a.volume = 0;
      this.el = a;
    } catch (e) {
      this.el = null;
    }
    return this.el;
  },
  _target() {
    return this.vol * this.duckFactor;
  },
  setVolume(v) {
    this.vol = Math.max(0, Math.min(1, v));
    if (this.el && !this.el.paused) this._fade(this._target(), 200);
  },
  setDuck(factor, ms = 350) {
    this.duckFactor = factor;
    if (this.el && !this.el.paused) this._fade(this._target(), ms);
  },
  _fade(to, ms, done) {
    const a = this.el;
    if (!a) return;
    clearInterval(this.fadeTimer);
    const from = a.volume,
      steps = Math.max(1, Math.round(ms / 50));
    let i = 0;
    this.fadeTimer = setInterval(() => {
      i++;
      a.volume = Math.max(0, Math.min(1, from + (to - from) * (i / steps)));
      if (i >= steps) {
        clearInterval(this.fadeTimer);
        this.fadeTimer = null;
        if (done) done();
      }
    }, 50);
  },
  start() {
    this.wantPlaying = true;
    const a = this._ensure();
    if (!a) return;
    if (!a.paused) {
      this._fade(this._target(), 300); // 이미 재생 중이면 볼륨만 목표치로
      return;
    }
    // 브라우저 자동재생 정책: 사용자 제스처 이후에만 성공한다. 실패해도 조용히 넘어간다.
    const pr = a.play();
    if (pr && pr.catch) pr.catch(() => {});
    this._fade(this._target(), 700);
  },
  stop() {
    this.wantPlaying = false;
    const a = this.el;
    if (!a || a.paused) return;
    this._fade(0, 400, () => {
      try { a.pause(); } catch (e) {}
    });
  }
};
// 앱이 백그라운드로 가면(다른 앱 전환, 화면 꺼짐 등) 배경음을 즉시 멈추고,
// 다시 돌아왔을 때 재생 중이었다면 이어서 튼다.
if (typeof document !== "undefined") {
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      bgm._resumeOnVisible = !!(bgm.el && !bgm.el.paused);
      if (bgm.el && !bgm.el.paused) {
        try { bgm.el.pause(); } catch (e) {}
      }
    } else if (bgm.wantPlaying && bgm._resumeOnVisible) {
      bgm._resumeOnVisible = false;
      const a = bgm._ensure();
      if (a) {
        const pr = a.play();
        if (pr && pr.catch) pr.catch(() => {});
      }
    }
  });
}

// 또한 gradient id가 전역 고정이라 같은 화면에 여러 마리가 뜨면 참조가 충돌한다
// → 인스턴스마다 고유 접미사를 붙여 격리한다.
const SVG_ATTR_MAP = [
  [/stopColor=/g, "stop-color="],
  [/stopOpacity=/g, "stop-opacity="],
  [/strokeWidth=/g, "stroke-width="],
  [/strokeLinecap=/g, "stroke-linecap="],
  [/strokeLinejoin=/g, "stroke-linejoin="],
  [/strokeDasharray=/g, "stroke-dasharray="],
  [/fillOpacity=/g, "fill-opacity="],
  [/fillRule=/g, "fill-rule="],
  [/textAnchor=/g, "text-anchor="],
  [/fontSize=/g, "font-size="],
  [/fontWeight=/g, "font-weight="],
  [/paintOrder=/g, "paint-order="],
  [/gradientUnits=/g, "gradient-units="],
  [/clipPath=/g, "clip-path="],
  [/xlinkHref=/g, "xlink:href="]
];
const svgFixCache = {};
function svgFix(markup, uid) {
  const key = uid + "|" + markup.length + markup.slice(0, 24);
  if (svgFixCache[key]) return svgFixCache[key];
  let out = markup;
  for (const [re, to] of SVG_ATTR_MAP) out = out.replace(re, to);
  // id="fg12" → id="fg12_uid", url(#fg12) → url(#fg12_uid)
  out = out.replace(/id="([\w-]+)"/g, (_, id) => `id="${id}_${uid}"`);
  out = out.replace(/url\(#([\w-]+)\)/g, (_, id) => `url(#${id}_${uid})`);
  svgFixCache[key] = out;
  return out;
}
const FALLBACK_ART = `<defs><linearGradient id="fgx" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6f9aa6"/><stop offset="45%" stopColor="#9fd3e0"/><stop offset="100%" stopColor="#c8f2ff"/></linearGradient></defs><path d="M82,24 Q94,14 98,10 Q95,19 94,26 Q95,33 98,42 Q94,38 82,29 Z" fill="#82adb7"/><path d="M10,26 Q18,15 42,14 Q68,14 80,25 Q68,38 42,38 Q18,37 10,26 Z" fill="url(#fgx)"/><circle cx="16" cy="23" r="3.3" fill="#fff"/><circle cx="15.2" cy="23" r="1.8" fill="#12232b"/>`;

var root = ReactDOM.createRoot(document.getElementById("root"));

<script>
// ── PWA: 서비스워커 등록 (오프라인 지원) ──
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  });
}

// ── 가로 고정 시도 ──
// PWA 전체화면(설치 후 실행)일 때 화면을 가로로 잠금.
// 브라우저 탭에서는 잠금이 허용되지 않으므로, 게임 내 회전 안내가 대신 뜬다.
function lockLandscape() {
  try {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock("landscape").catch(function () {});
    }
  } catch (e) {}
}
// 설치된 앱(전체화면/standalone)으로 실행된 경우에만 잠금 시도
function isStandalone() {
  return (window.matchMedia && window.matchMedia("(display-mode: fullscreen), (display-mode: standalone)").matches)
    || window.navigator.standalone === true;
}
if (isStandalone()) {
  lockLandscape();
  // 회전이 풀리면 다시 잠금
  window.addEventListener("orientationchange", lockLandscape);
}
// 첫 사용자 입력 시에도 한 번 더 시도 (일부 브라우저는 제스처 후에만 허용)
document.addEventListener("pointerdown", function once() {
  if (isStandalone()) lockLandscape();
  document.removeEventListener("pointerdown", once);
}, { once: true });
</script>
